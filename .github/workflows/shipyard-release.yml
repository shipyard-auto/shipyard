name: Shipyard Release

on:
  push:
    branches:
      - main
    paths:
      - "cmd/shipyard/**"
      - "internal/**"
      - "pkg/**"
      - "manifest"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/shipyard-release.yml"

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: shipyard-release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: Detect shipyard version change
        id: detect
        shell: bash
        run: |
          curr=$(grep '^shipyard=' manifest | cut -d= -f2)
          prev=$(git show ${{ github.event.before }}:manifest 2>/dev/null | grep '^shipyard=' | cut -d= -f2 || echo "0.0.0")

          echo "curr=$curr"
          echo "prev=$prev"

          if [ "$curr" = "$prev" ]; then
            echo "Versão shipyard não mudou ($curr) — skipping release."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Versão shipyard mudou: $prev → $curr"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$curr" >> "$GITHUB_OUTPUT"

      - name: Compute release version
        if: steps.detect.outputs.changed == 'true'
        id: version
        shell: bash
        run: |
          version="${{ steps.detect.outputs.version }}"
          if [ -z "$version" ]; then
            echo "Versão não encontrada em manifest nem em VERSION" >&2
            exit 1
          fi

          tag="v$version"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag já existe. Atualize a versão shipyard em manifest antes de fazer push para main." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from merged PR
        if: steps.detect.outputs.changed == 'true'
        id: changelog
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const response = await github.request("GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls", {
              owner,
              repo,
              commit_sha: sha,
              mediaType: { previews: ["groot"] }
            });

            const pr = response.data[0];
            const fallbackBody = [
              `## Release ${process.env.RELEASE_TAG}`,
              "",
              "Automated release from a direct push to `main`.",
              "",
              `- Commit: ${sha}`
            ].join("\n");

            if (!pr) {
              core.setOutput("body", fallbackBody);
              return;
            }

            const prBody = (pr.body || "").trim();
            const summary = prBody.length > 0 ? prBody : "_No PR description provided._";
            const body = [
              `## Release ${process.env.RELEASE_TAG}`,
              "",
              `Source PR: #${pr.number} - ${pr.title}`,
              "",
              "### Changelog",
              summary,
              "",
              "### Metadata",
              `- PR: #${pr.number}`,
              `- Author: @${pr.user.login}`,
              `- Merge Commit: ${sha}`
            ].join("\n");

            core.setOutput("body", body);
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}

      - name: Run tests
        if: steps.detect.outputs.changed == 'true'
        run: go test ./...

      - name: Build release artifacts
        if: steps.detect.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: make package

      - name: Create GitHub release
        if: steps.detect.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/shipyard_${{ steps.version.outputs.version }}_linux_amd64.tar.gz
            dist/shipyard_${{ steps.version.outputs.version }}_linux_arm64.tar.gz
            dist/shipyard_${{ steps.version.outputs.version }}_darwin_amd64.tar.gz
            dist/shipyard_${{ steps.version.outputs.version }}_darwin_arm64.tar.gz
